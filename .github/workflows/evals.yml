name: Skill Evals

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a newer commit is pushed to the same branch/PR.
# Grouped by workflow + ref so push-to-main and each PR get independent lanes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skills
        run: |
          python3 - <<'EOF'
          import json, re, sys, yaml
          from pathlib import Path

          SKILLS_DIR = Path("skills")
          failures = []

          for skill_dir in sorted(SKILLS_DIR.iterdir()):
              if not skill_dir.is_dir():
                  continue
              skill = skill_dir.name
              skill_md = skill_dir / "SKILL.md"

              if not skill_md.exists():
                  failures.append(f"{skill}: missing SKILL.md")
                  continue

              content = skill_md.read_text()
              parts = content.split("---", 2)
              if len(parts) < 3:
                  failures.append(f"{skill}: SKILL.md missing frontmatter")
                  continue

              try:
                  fm = yaml.safe_load(parts[1])
              except yaml.YAMLError as exc:
                  failures.append(f"{skill}: invalid YAML frontmatter: {exc}")
                  continue

              if not fm.get("name"):
                  failures.append(f"{skill}: missing 'name' field")
              if not fm.get("description"):
                  failures.append(f"{skill}: missing 'description' field")

              desc = str(fm.get("description", ""))
              if len(desc) > 1024:
                  failures.append(f"{skill}: description {len(desc)} chars (limit 1024)")

              body_lines = len(parts[2].splitlines())
              if body_lines > 500:
                  failures.append(f"{skill}: body {body_lines} lines (limit 500)")

              for link in re.findall(r'\[.*?\]\(([^)]+)\)', parts[2]):
                  if link.startswith(("http://", "https://", "#")):
                      continue
                  if not (skill_dir / link).exists():
                      failures.append(f"{skill}: broken reference '{link}'")

          if failures:
              print("Validation failed:")
              for msg in failures:
                  print(f"  {msg}")
              sys.exit(1)

          total = sum(1 for d in SKILLS_DIR.iterdir() if d.is_dir())
          print(f"All {total} skills validated OK")
          EOF

  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write   # mandatory for OIDC — omitting causes silent auth failure
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Configure AWS credentials (Bedrock via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-2

      - name: Run full evals (Claude on Bedrock)
        env:
          PYTHONUNBUFFERED: "1"        # flush progress lines immediately (no TTY in CI)
          EVAL_MAX_CONCURRENCY: "12"   # total in-flight Bedrock requests; tune to quota
          EVAL_SKILL_PARALLELISM: "8"  # skills evaluated at once
        run: |
          # The script's inline metadata declares only anthropic[bedrock], so this
          # resolves fast — no local-model source builds. Skills run concurrently,
          # bounded by EVAL_MAX_CONCURRENCY above; -v prints per-assertion detail.
          uv run run_evals.py \
            --simulate --fail-below 0.8 -v \
            --agent-model eu.anthropic.claude-sonnet-4-6 \
            --grader-model eu.anthropic.claude-opus-4-8
